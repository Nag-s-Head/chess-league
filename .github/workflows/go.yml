name: Go CI

permissions:
  contents: read

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["*"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/workflows/shared/setup

      - name: Build
        run: make build -j

      - name: Test
        run: make test -j
