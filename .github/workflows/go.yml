name: Go CI

permissions:
  contents: read

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["*"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Setup pnpm
        run: npm i -g pnpm@10

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Build
        run: make build -j

      - name: Test
        run: make test -j
