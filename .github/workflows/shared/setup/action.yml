name: setup

description: Setsup all of the project dependancies

runs:
  using: composite
  steps:
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: "1.25"
        cache: true
    - name: Setup node
      uses: actions/setup-node@v6
      with:
        node-version: "20"
    - uses: pnpm/action-setup@v4
      with:
        version: 9
