<div class="p-5 border-2 border-gray-300 rounded-lg bg-gray-100">
  <p class="text-lg">
    Come play chess at {{.Theme.VenueName}}, we have played
    <span class="font-bold">{{.TotalGames}}</span> games with
    <span class="font-bold">{{.TotalPlayers}}</span> players.
  </p>
</div>

<h1 class="text-2xl font-bold mt-5">Leaderboard</h1>
{{range $Res := .Players}}
<a
  href="/player/{{$Res.Id}}"
  class="flex flex-row items-center gap-3 p-3 border-2 border-gray-500 rounded-lg cursor-pointer hover:bg-gray-100 transition-colors"
>
  <div class="flex flex-row justify-between w-full">
    <h4 class="text-lg font-bold">{{$Res.Name}}</h4>
    <p>
      {{printf "%.0f" $Res.Liglicko2Rating}} ELO {{if (ge
      $Res.Liglicko2Deviation $.MinimumStableRatingDeviation)}}
      <span class="font-normal text-gray-800">??</span>{{end}}
    </p>
  </div>
</a>
{{end}}
