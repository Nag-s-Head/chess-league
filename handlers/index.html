<p class="text-lg">
  Come play chess at the
  <a
    class="text-blue-800 underline hover:text-blue-600 text-nowrap"
    href="https://maps.app.goo.gl/EkF57yDaQM7Pgf8g6"
    >Nag&apos;s Head in Reading</a
  >, we have played <span class="font-bold">{{.TotalGames}}</span> games with
  <span class="font-bold">{{.TotalPlayers}}</span> players.
</p>

<img
  class="h-1/3 2xl:h-1/4 w-screen aspect-3/2"
  src="/assets/wide_shot.jpg"
  alt="A wide shot of the Nag's Knights team playing chess at the Nag's Head against the Alehouse Hobgoblins. Taken during our tournament match in early 2026."
/>

<h1 class="text-2xl font-bold mt-5">Leaderboard</h1>
{{range $result := .Players}}
<a
  href="/player/{{.Id}}"
  class="flex flex-row items-center gap-3 p-3 border-2 border-gray-500 rounded-lg cursor-pointer hover:bg-gray-100 transition-colors"
>
  <div class="flex flex-row justify-between w-full">
    <h4 class="text-lg font-bold">{{.Name}}</h4>
    <p>{{.Elo}} ELO</p>
  </div>
</a>
{{end}}
