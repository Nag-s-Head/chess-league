<h1 class="text-xl font-bold">Admin Users</h1>
{{range $result := .}}
<a
  href="/admin/player/{{.Id}}"
  class="flex flex-col gap-3 p-3 border-2 border-gray-500 rounded-lg cursor-pointer hover:bg-gray-100 transition-colors"
>
  <div class="flex flex-row justify-between w-full">
    <h4 class="text-lg font-bold">{{.Name}}</h4>
    <p>({{.Id}})</p>
  </div>

  <p>
    Since {{.Created.Format "Jan 02, 2006"}}, last online {{.LastLogin.Format
    "Jan 02, 2006"}}.
  </p>
</a>
{{end}}
