<h2 class="text-lg font-bold">Audit Log</h2>
<div class="flex flex-col gap-3">
  {{range $result := .}}
  <a
    href="/admin/audit_logs/{{.Id}}"
    class="flex flex-col gap-3 p-3 border-2 border-gray-500 rounded-lg cursor-pointer hover:bg-gray-100 transition-colors"
  >
    <h4 class="text-lg font-bold">{{.OperationName}}</h4>
    <p>{{.OperationDescription}}</p>
    <p>By {{.AdminName}}</p>
    <p>{{.Created.Format "Jan 02, 2006"}}.</p>
  </a>
  {{end}}
</div>
